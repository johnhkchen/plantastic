<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Plantastic Viewer</title>
    <link data-trunk rel="rust" data-wasm-opt="0" />
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        #bevy-canvas {
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
            z-index: 100;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #4ecca3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading viewer...</div>
    </div>
    <canvas id="bevy-canvas"></canvas>
    <script>
        // Hide loading indicator once WASM initializes and Bevy starts rendering
        const canvas = document.getElementById('bevy-canvas');
        const observer = new MutationObserver(() => {
            if (canvas.width > 0 && canvas.height > 0) {
                document.getElementById('loading').style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(canvas, { attributes: true });
        // Fallback: hide after 10 seconds regardless
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 10000);
    </script>
</body>
</html>
