name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  STAGE: dev

jobs:
  deploy:
    name: Build & Deploy (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-west-2
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ──────────────────────────────────────────
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install zig
        run: sudo snap install zig --classic --beta

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      # ── Build Lambda ────────────────────────────────────────────
      - name: Build Lambda binary
        run: ./scripts/build-lambda.sh

      # ── Node toolchain ──────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      # ── Deploy Lambda + S3 via SST ──────────────────────────────
      - name: Install SST dependencies
        run: cd infra && npm install

      - name: Deploy infrastructure (SST)
        id: sst
        run: |
          cd infra
          OUTPUT=$(npx sst deploy --stage $STAGE 2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"
          API_URL=$(echo "$OUTPUT" | grep -oP 'apiUrl:\s*\K\S+' || echo "")
          if [ -z "$API_URL" ]; then
            echo "Failed to extract apiUrl from SST output"
            exit 1
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "Extracted API URL: $API_URL"

      # ── Deploy SvelteKit to CF Pages ────────────────────────────
      - name: Install web dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Build SvelteKit
        run: cd web && pnpm run build

      - name: Deploy to Cloudflare Pages
        run: cd web && npx wrangler pages deploy .svelte-kit/cloudflare --project-name plantastic

      # ── Deploy CF Worker ────────────────────────────────────────
      - name: Install worker dependencies
        run: cd worker && npm install

      - name: Set Worker BACKEND_URL secret
        working-directory: worker
        run: echo "${{ steps.sst.outputs.api_url }}" | npx wrangler secret put BACKEND_URL

      - name: Deploy CF Worker
        id: worker
        working-directory: worker
        run: |
          OUTPUT=$(npx wrangler deploy 2>&1) || { echo "$OUTPUT"; exit 1; }
          echo "$OUTPUT"
          WORKER_URL=$(echo "$OUTPUT" | grep -oP 'https://\S+\.workers\.dev' | head -1 || echo "")
          if [ -n "$WORKER_URL" ]; then
            echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
          fi

      # ── Smoke tests ─────────────────────────────────────────────
      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        env:
          SMOKE_URL: ${{ steps.worker.outputs.worker_url }}
        run: |
          if [ -z "$SMOKE_URL" ]; then
            echo "No worker URL captured — using direct Lambda URL for smoke test"
            SMOKE_URL="${{ steps.sst.outputs.api_url }}"
          fi
          ./scripts/verify-deploy.sh "$SMOKE_URL"

      - name: Report smoke test result
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::warning::Smoke tests failed. Deployment is live but may have issues. Investigate manually."
          exit 1
