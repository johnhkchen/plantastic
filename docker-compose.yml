# Plantastic local development services
#
# Services:
#   db      — PostgreSQL 18 + PostGIS 3.6 (port 5432)
#   valkey  — Valkey 8, Redis-compatible cache (port 6379)
#
# Usage:
#   just dev-db      Start database + cache, wait for health
#   just dev-stack   Start everything + print next steps
#   just dev-down    Stop services
#   just dev-reset   Nuke volumes + restart fresh
#
# Migrations are applied automatically on first start via
# scripts/docker-init-db.sh mounted into the Postgres entrypoint.

services:
  db:
    image: postgis/postgis:18-3.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: plantastic
      POSTGRES_USER: plantastic
      POSTGRES_PASSWORD: plantastic
    volumes:
      - plantastic-db-data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
      - ./scripts/docker-init-db.sh:/docker-entrypoint-initdb.d/01-migrations.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantastic -d plantastic"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  plantastic-db-data:
